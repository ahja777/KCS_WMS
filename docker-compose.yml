version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: kcs-wms-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kcs_wms_db
      MYSQL_USER: clip_user
      MYSQL_PASSWORD: clip_dev_password_2024
    volumes:
      - mariadb_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: kcs-wms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mariadb_data:
  redis_data:
